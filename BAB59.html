  <!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Latihan Kosakata</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .card {
    background: white;
    padding: 30px;
    width: 400px;
    text-align: center;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
  }
  input {
    width: 90%;
    padding: 8px;
    margin-top: 15px;
  }
  button {
    margin-top: 20px;
    padding: 8px 15px;
    cursor: pointer;
  }
  .result {
    font-size: 18px;
    font-weight: bold;
  }
  .wrong { color: red; }
  .correct { color: green; }
  ol { text-align:left; max-height:400px; overflow:auto; }
</style>
</head>
<body>

<div class="card">
  <h2 id="question"></h2>
  <input type="text" id="answerInput" placeholder="Tulis jawaban di sini">
  <br>
  <button id="nextBtn">Selanjutnya</button>
</div>

<script>
let questions = [
{ soal: "출입국 관리법", jawaban: "hukum migrasi" },
{ soal: "체류가능 기간", jawaban: "masa memungkinkan tinggal" },

{ soal: "구직자", jawaban: "pencari kerja" },

{ soal: "마약 검사 확인서", jawaban: "sertifikat tes narkoba" },
{ soal: "차다", jawaban: "dingin" },
{ soal: "법무부", jawaban: "kementerian kehakiman" },
{ soal: "연락", jawaban: "menghubungi" },
{ soal: "제출하다", jawaban: "menyerahkan" },
{ soal: "접수하다", jawaban: "mendaftarkan / menerima berkas" },
{ soal: "만류되다", jawaban: "dicegah" },
{ soal: "여권용 사진", jawaban: "foto paspor" },
{ soal: "여유", jawaban: "meluangkan waktu / kelonggaran" },
{ soal: "여권", jawaban: "paspor" },
{ soal: "귀국하다", jawaban: "pulang ke negara asal" },
{ soal: "수수료", jawaban: "biaya administrasi" },
{ soal: "지방고용노동관서", jawaban: "kantor ketenagakerjaan daerah" },
{ soal: "임대차 계약서", jawaban: "surat perjanjian sewa" },
{ soal: "물어보다", jawaban: "bertanya" },
{ soal: "묻다", jawaban: "bertanya" },

{ soal: "한눈 팔면 안 돼요", jawaban: "tidak boleh melamun / lengah" },

{ soal: "초과하다", jawaban: "melebihi" },
{ soal: "절차", jawaban: "prosedur" },
{ soal: "본인", jawaban: "orang yang bersangkutan" },

{ soal: "비회원", jawaban: "bukan anggota" },
{ soal: "신분증", jawaban: "KTP / kartu identitas" },
{ soal: "이내", jawaban: "dalam (batas waktu)" },
{ soal: "등록번호", jawaban: "nomor registrasi" },
{ soal: "고치다", jawaban: "memperbaiki" },
{ soal: "의료기관", jawaban: "fasilitas kesehatan" },
{ soal: "정확히", jawaban: "secara tepat / detail" },
{ soal: "방문하다", jawaban: "berkunjung" },
{ soal: "체류하다", jawaban: "tinggal" },
{ soal: "처벌", jawaban: "hukuman" },
{ soal: "징계", jawaban: "sanksi" }
];

// Acak soal
questions = questions.sort(() => Math.random() - 0.5);

let index = 0;
let score = 0;
let userAnswers = [];

const questionEl = document.getElementById("question");
const answerInput = document.getElementById("answerInput");
const nextBtn = document.getElementById("nextBtn");
const card = document.querySelector(".card");

function showQuestion() {
  questionEl.textContent = questions[index].soal;
  answerInput.value = "";
  answerInput.focus();
}

nextBtn.addEventListener("click", () => {
  const userAnswer = answerInput.value.trim().toLowerCase();
  userAnswers[index] = userAnswer; // simpan jawaban sesuai index

  if (userAnswer === questions[index].jawaban) {
    score++;
  }

  index++;
  if (index < questions.length) {
    showQuestion();
  } else {
    showResult();
  }
});

function showResult() {
  let answerList = "";
  questions.forEach((q, i) => {
    if (userAnswers[i] === q.jawaban) {
      answerList += `<li>${q.soal} = <span class="correct">${q.jawaban}</span></li>`;
    } else {
      answerList += `<li>${q.soal} = <span class="correct">${q.jawaban}</span><br>
                     Jawaban kamu: <span class="wrong">${userAnswers[i] || "(kosong)"}</span></li>`;
    }
  });

  card.innerHTML = `
    <h2>Hasil</h2>
    <hr>
    <p>Kunci Jawaban:</p>
    <ol>${answerList}</ol>
  `;
}

showQuestion();
</script>
